services:
  rally:
    build:
      context: .
      dockerfile: Dockerfile
    image: rally:latest
    depends_on:
      - es01
    container_name: rally
    # Run as root so GoReplay can capture on loopback (pcap needs it in containers).
    # Output .gor file is chown'd to host user (UID:GID) at the end.
    user: "0:0"
    cap_add:
      - NET_RAW
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - esnet
    volumes:
      - ${HOME}/.rally:/rally/.rally
    environment:
      - HOME=/rally
      - HOST_UID=${UID:-1000}
      - HOST_GID=${GID:-1000}
      - RALLY_HOME=/rally
      - RALLY_SRC=${RALLY_SRC:-}
      # Pass through proxy so Rally can fetch tracks/deps from the internet (set on host if behind a proxy).
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
    profiles:
      - rally

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.5
    container_name: es01
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - esdata1:/usr/share/elasticsearch/data
    ports:
      - 19200:9200
    networks:
      - esnet
    healthcheck:
      test: curl -f http://localhost:9200
      interval: 5s
      timeout: 2s
      retries: 10

networks:
  esnet:
    name: rally-tests

volumes:
  esdata1:
    driver: local
  rally:
    driver: local
