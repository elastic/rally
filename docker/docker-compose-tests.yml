services:

  # With both `image` and `build`, Compose uses the image name/tag from `image` and builds from `build` when the
  # image is absent locally. IT builds the dev image before `compose run`; release-docker-test.sh sets RALLY_* to
  # test a pre-built image.
  rally:
    image: ${RALLY_DOCKER_IMAGE:-elastic/rally}:${RALLY_VERSION_TAG:-dev}
    build:
      context: ../
      dockerfile: ${RALLY_DOCKER_FILE:-docker/Dockerfiles/dev/Dockerfile}
    container_name: rally
    command: ${TEST_COMMAND:---help}
    volumes:
      - rally:/rally/.rally
    networks:
      - esnet
    depends_on:
      es01:
        condition: service_healthy

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    container_name: es01
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      # If you enable security below, configure TLS for clients (e.g. HTTP CA from the container); see Elasticsearch
      # Docker documentation for exporting the CA certificate.
      # - xpack.security.enabled=false
      # - xpack.security.enrollment.enabled=false
    volumes:
      - esdata1:/usr/share/elasticsearch/data
    # Uncomment `ports` when you need HTTP access from the host (debugging, curl from the machine running Compose).
    # Pick a host port that does not conflict with another local Elasticsearch instance.
    # ports:
    #   - 19200:9200
    networks:
      - esnet
    healthcheck:
          test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
          interval: 5s
          timeout: 2s
          retries: 30

networks:
  esnet:
    name: rally-tests

volumes:
  esdata1:
    driver: local
  rally:
    driver: local
