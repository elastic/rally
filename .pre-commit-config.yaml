repos:
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.7.0
    hooks:
      - id: pyupgrade
        args: [
          "--py39-plus",
          "--keep-percent-format"
        ]

  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        args: []

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [
          "--config",
          "pyproject.toml"
        ]
        # Suppress a flaky internal mypy error appearing randomly when executing make lint.
        require_serial: true

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        args:
          [
            "-rn",
            "-j0",
            "--rcfile=.pylintrc",
          ]
        exclude: ^(docs/)
        require_serial: true

  # Shell scripts: release tooling and repo githooks. Widen to all *.sh once legacy
  # scripts under .buildkite/, recipes/, repo root, etc. pass shellcheck.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: shellcheck
        args: [-x]
        files: (^scripts/release/.*\.sh$)
