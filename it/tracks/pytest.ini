[pytest]
# When pytest collects from this tree, this file becomes the inifile; pytest then
# sets confcutdir to this directory (see _pytest.config.Config._preparse), so
# it/conftest.py is not loaded. Local hooks live in conftest.py next to this file.
addopts = --verbose --color=yes -n auto --dist loadgroup
log_level = INFO
log_format = %(asctime)s %(levelname)s [%(name)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
